<div class="container">
  <div class="filter-container">
    <mat-form-field class="filter" appearance="outline">
      <mat-label>Filter by Fleet</mat-label>
      <input matInput type="text" [ngModel]="fleetFilter()" (ngModelChange)="fleetFilter.set($event)"
        placeholder="e.g., Laser" />
      @if (fleetFilter()) {
      <button matSuffix matIconButton aria-label="Clear" (click)="fleetFilter.set('')">
        <mat-icon>close</mat-icon>
      </button>
      }
    </mat-form-field>
    @if (!breakpoints.isMobile()) {
      <button class="align-right" mat-icon-button (click)="this.hide.emit()" title="Hide panel">
        <mat-icon>close</mat-icon>
      </button>
    }
  </div>

  <mat-accordion multi>
    @for (season of expansionPanels(); track season.title; let isFirst = $first) {
    <mat-expansion-panel [expanded]="isFirst">
      <mat-expansion-panel-header>
        <mat-panel-title>
          {{ season.title }}
        </mat-panel-title>
      </mat-expansion-panel-header>

      <mat-nav-list>
        @for (series of season.series; track series.id) {
        <mat-list-item>
          <a [routerLink]="['/results/viewer/', series.id]">{{ series.name }}</a>
        </mat-list-item>
        }
      </mat-nav-list>
    </mat-expansion-panel>
    }
  </mat-accordion>
</div>
