<form (ngSubmit)="submit()" [formGroup]="form" novalidate>

  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput formControlName="name">
    <mat-error>Class name is required</mat-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Handicap</mat-label>
    <input matInput type="number" formControlName="handicap">
    <mat-error>Handicap is required</mat-error>
  </mat-form-field>

  <div class="button-row">
    <app-submit-button [disabled]="form.invalid || !form.dirty" [busy]="busy()">
      Save
    </app-submit-button>
  </div>

</form>
