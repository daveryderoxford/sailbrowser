<app-toolbar title="Fleets" showBack></app-toolbar>

<div class="content">

  @if (cs.isLoading()) {
    <app-loading-centered />
  } @else {
    <div class="search-bar">
      <mat-form-field class="search" appearance="outline">
        <mat-label>Search Fleets</mat-label>
        <input matInput [formControl]="searchControl" placeholder="Search by name or short name">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <a matButton="tonal" class="right-justify" routerLink="add">
        New
      </a>
    </div>

    <mat-list>
      @for (fleet of filteredFleets(); track fleet.id) {
        <mat-list-item [routerLink]="['edit', fleet.id]">
          <span matListItemTitle>{{ fleet.name }}</span>
          <span matListItemLine>Short Name: {{ fleet.shortName }}</span>
          <span matListItemLine>Handicap Systems: {{ fleet.handicapSchemes.join(', ') || 'None' }}</span>
          <span matListItemMeta>
            <button matIconButton [routerLink]="['edit', fleet.id]" (click)="$event.stopPropagation()">
              <mat-icon class="green">edit</mat-icon>
            </button>
            <button matIconButton (click)="deleteFleet(fleet); $event.stopPropagation()">
              <mat-icon class="warning">delete</mat-icon>
            </button>
          </span>
        </mat-list-item>
        <mat-divider></mat-divider>
      } @empty {
        <mat-list-item>
          <span matListItemTitle>No fleets found</span>
        </mat-list-item>
      }
    </mat-list>
  }
</div>
