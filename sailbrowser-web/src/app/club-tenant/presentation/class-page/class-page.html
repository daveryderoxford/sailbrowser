<app-toolbar title="Classes" showBack></app-toolbar>

<div class="content">

  @if (cs.isLoading()) {
    <app-loading-centered />
  } @else {
    <div class="search-bar">
      <mat-form-field class="search" appearance="outline">
        <mat-label>Search Classes</mat-label>
        <input matInput [formControl]="searchControl" placeholder="Search by name">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <a matButton="tonal" class="right-justify" routerLink="add">
         New
      </a>
    </div>

    <mat-list>
      @for (boatClass of filteredClasses(); track boatClass.id) {
        <mat-list-item [routerLink]="['edit', boatClass.id]">
          <span matListItemTitle>{{ boatClass.name }}</span>
          <span matListItemLine>Handicap: {{ boatClass.handicap }}</span>
          <span matListItemMeta>
            <button matIconButton [routerLink]="['edit', boatClass.id]" (click)="$event.stopPropagation()">
              <mat-icon class="green">edit</mat-icon>
            </button>
            <button matIconButton (click)="deleteClass(boatClass); $event.stopPropagation()">
              <mat-icon class="warning">delete</mat-icon>
            </button>
          </span>
        </mat-list-item>
        <mat-divider></mat-divider>
      } @empty {
        <mat-list-item>
          <span matListItemTitle>No classes found</span>
        </mat-list-item>
      }
    </mat-list>
  }
</div>
